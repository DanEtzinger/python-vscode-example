#                                Example Extension - Python
# ==================================================================================================
# Repositories for each data source can be found in the following lines:
# ==================================================================================================
# JDBC   https://github.com/dynatrace-extensions/jdbc-vscode-example
# SQL    https://github.com/dynatrace-extensions/sql-vscode-example
# JMX    https://github.com/dynatrace-extensions/jmx-vscode-example
# SNMP   https://github.com/dynatrace-extensions/snmp-vscode-example
# PYTHON https://github.com/dynatrace-extensions/python-vscode-example 
# WMI    https://github.com/dynatrace-extensions/wmi-vscode-example
# ==================================================================================================
# Dynatrace documentation for each data source can be found in the following lines:
# ==================================================================================================
# JDBC/SQL https://docs.dynatrace.com/docs/shortlink/sql-reference
# JMX      https://docs.dynatrace.com/docs/shortlink/jmx-extensions-reference
# SNMP     https://docs.dynatrace.com/docs/shortlink/snmp-extensions-reference
# PYTHON   https://dt-url.net/7g638yh
# WMI      https://docs.dynatrace.com/docs/shortlink/wmi-extensions-reference
# ==================================================================================================
# For general extesnion yaml guidance, check out:
#
# https://docs.dynatrace.com/docs/shortlink/extension-yaml
# ==================================================================================================
# Purpose:
#
# These example extensions exist to provide minimal examples of how to ingest
# data for each data source. They are not meant to be comprehensive, but rather
# provide a useful starting point to creating custom extensions.
#
# In this specific example for the python data source, there a few more nodes added in the yaml that
# demonstrate how to add alerting templates, and dashboards.
# ==================================================================================================
# NOTE: For best results, work with these examples using the VS Code Dynatrace Extensions Add-On.
# https://marketplace.visualstudio.com/items?itemName=DynatracePlatformExtensions.dynatrace-extensions
# ==================================================================================================
name: custom:python-vscode-example
version: 0.0.1
minDynatraceVersion: 1.318.0
author:
  name: "Dynatrace"

# This is where Davis Anomaly Detetctor alert templates can be defined: https://docs.dynatrace.com/docs/shortlink/extensions-alerting
alertTemplates:
  - title: "Python-VSCode-Example 700 or more rows added to Order Table"
    description: "700 or more rows have been added in the last minute to the Order Table"
    executionSettings:
      queryOffset: 2
    analyzer:
      name: "dt.statistics.ui.anomaly_detection.StaticThresholdAnomalyDetectionAnalyzer"
      input:
        query: timeseries avg(python_vscode.example.sqlite.rows), by:{`dt.entity.sqlite:database`,table} | filter table == "Orders" | fieldsAdd newRows = ((`avg(python_vscode.example.sqlite.rows)`[-1]) - (`avg(python_vscode.example.sqlite.rows)`[-2]))
        threshold: 699
        alertCondition: ABOVE
        alertOnMissingData: false
        violatingSamples: 1
    eventTemplate:
      event.description: "700 row increase in Orders Table"
      event.name: "Significant increase in Orders Table"
      event.type: CUSTOM_ALERT
      dt.source_entity: "{dims:dt.entity.sqlite:database}"
# Dashboards for Classic Dynatrace are defined here.    
dashboards:
  - path: dashboards/overview_dashboard.json
# New Dynatrace Dashboards are defined here.  
documents:
  dashboards:
    - displayName: VS Code Example Python Extension Overview
      path: documents/vs_code_example_overview.dashboard.json
alerts:
  - path: alerts/alert-001-python-vscode-example-row-increase.json
    
# Its a good practice to name metric keys with a prefix that relates to the extension's name/function
metrics:
  - key: python_vscode.example.sqlite.rows
    # While not required, metadata is useful for viewing metric descriptions in the UI, and allows for intelligent formatting of units in DQL Tables or dashboard charts for example.    
    metadata:
      displayName: Example SQLite Rows
      unit: Unspecified
      dimensions:
        - key: host_name
          displayName: Hostname
        - key: ip_address
          displayName: IP Address
        - key: database_name
          displayName: Database Name
          
# Python data source specific information is located here.
python:
  runtime:
    module: python_vscode_example
    version:
      min: "3.10"
# Specifying both remote and local activation means that the extension can run on either an ActiveGate or a OneAgent.
  activation:
    remote:
      path: activationSchema.json
    local:
      path: activationSchema.json
  featureSets:
    - featureSet: default
      metrics:
        - key: python_vscode.example.sqlite.rows

# Defining topology allows generic entities to be created.          
# Note that this is not required, and is only included for provide an example
topology:
  types:
    - name: sqlite:host
      enabled: true
      displayName: SQLite Host
      rules:
        # The idPattern is what makes the specific entity unique.
        # Its important that there is some value that makes this unique. In this case,
        # its the `sqlite_host_` section, as its very possible another extension on this same host
        # uses generic topology with the `host_name` and `ip_address` dimensions.
        - idPattern: sqlite_host_{host_name}_{ip_address}
        # The instanceNamePattern defines how the entities' name will actually display in Dynatrace.
          instanceNamePattern: Sqlite Host {host_name}
          # Since the topology is formed from certain dimensions,
          # this section defines which metrics contain the dimensions that will be used for the generic topology
          sources:
            - sourceType: Metrics
              condition: $prefix(python_vscode.example.sqlite)
          attributes:
            - key: host_name
              # The `pattern` is simply a dimension enclosed in "{}".
              # The `key` is just a field that refers to the defined pattern
              pattern: "{host_name}"
              displayName: Host
            - key: ip_address
              pattern: "{ip_address}"
              displayName: IP Address
            - key: database_name
              pattern: "{database_name}"
            - key: dt.security_context
              displayName: Security Context
              pattern: '{dt.security_context}'
    - name: sqlite:database
      enabled: true
      displayName: SQLite Database
      rules:
        - idPattern: sqlite_database_{database_name}_{host_name}
          instanceNamePattern: SQLite Database {database_name}
          sources:
            - sourceType: Metrics
              condition: $prefix(python_vscode.example.sqlite)
          attributes:
            - key: host_name
              pattern: "{host_name}"
              displayName: Host
            - key: ip_address
              pattern: "{ip_address}"
              displayName: IP Address
            - key: database_name
              pattern: "{database_name}"
            - key: dt.security_context
              displayName: Security Context
              pattern: '{dt.security_context}'
  # Relationships define how topology is related to each other.
  relationships:
    - enabled: true
      sources:
        - sourceType: Metrics
          # The condition states that the metrics meeting this condition must exist in Dynatrace
          # before trying to create the relationship.
          condition: $prefix(python_vscode.example.sqlite)
      fromType: sqlite:database
      # The different types of relationships can be listed by using the 'auto-fill' functionality of the Dynatrace Extensions VS Code Add-On.
      typeOfRelation: RUNS_ON
      toType: sqlite:host
